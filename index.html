<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cartas Duplas</title>
    <script type="module" src="./dist/sdk-boot.js?v=36"></script>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <img src="./icons/card.svg" alt="" class="topbar__icon" />
        <div>
          <h1>Cartas Duplas</h1>
          <p id="connectionStatus" class="status">Carregando painel...</p>
        </div>
      </header>

      <section class="form">
        <h2>Ações</h2>
        <div class="action-grid">
          <button id="panelFlipButton" class="button button--secondary" type="button" disabled>
            Virar selecionada
          </button>
          <button id="panelDrawButton" class="button button--secondary" type="button" disabled>
            Comprar da pilha
          </button>
          <button id="panelShuffleButton" class="button button--secondary" type="button" disabled>
            Embaralhar pilha
          </button>
          <button id="panelReturnButton" class="button button--secondary" type="button" disabled>
            Devolver para pilha
          </button>
          <button id="panelRepairButton" class="button button--secondary" type="button" disabled>
            Sincronizar cena
          </button>
        </div>
      </section>

      <section class="form">
        <h2>Biblioteca</h2>
        <label class="field">
          <span>Pilha padrao</span>
          <select id="presetDeckSelect" disabled></select>
        </label>
        <p id="presetDeckInfo" class="field-note"></p>
        <div class="row">
          <label class="field">
            <span>Largura no grid</span>
            <input id="presetDeckGridWidth" name="presetDeckGridWidth" type="number" min="0.25" max="20" step="0.25" value="2" disabled />
          </label>

          <label class="field">
            <span>Camada</span>
            <select id="presetDeckLayer" disabled>
              <option value="DRAWING">Drawing</option>
              <option value="PROP" selected>Prop</option>
              <option value="MOUNT">Mount</option>
              <option value="CHARACTER">Character</option>
              <option value="ATTACHMENT">Attachment</option>
              <option value="NOTE">Note</option>
              <option value="TEXT">Text</option>
            </select>
          </label>
        </div>
        <button id="importPresetDeckButton" class="button button--secondary" type="button" disabled>
          Criar pilha da biblioteca
        </button>
      </section>

      <section class="form">
        <h2>Selecao de personagem</h2>
        <label class="field">
          <span>Cor ativa</span>
          <select id="activeColorSelect" disabled>
            <option value="">Escolha uma cor</option>
          </select>
        </label>
        <div class="action-grid">
          <button class="button button--secondary swatch-button swatch-button--red" type="button" data-token-color="red" disabled>
            Marcar vermelho
          </button>
          <button class="button button--secondary swatch-button swatch-button--white" type="button" data-token-color="white" disabled>
            Marcar branco
          </button>
          <button class="button button--secondary swatch-button swatch-button--green" type="button" data-token-color="green" disabled>
            Marcar verde
          </button>
          <button class="button button--secondary swatch-button swatch-button--blue" type="button" data-token-color="blue" disabled>
            Marcar azul
          </button>
        </div>

        <div class="row">
          <label class="field">
            <span>Cor do slot</span>
            <select id="slotColorSelect" disabled></select>
          </label>

          <label class="field">
            <span>Categoria do slot</span>
            <select id="slotCategorySelect" disabled></select>
          </label>
        </div>
        <button id="saveSlotButton" class="button button--secondary" type="button" disabled>
          Salvar slot pela carta selecionada
        </button>

        <div class="action-grid">
          <button class="button button--secondary" type="button" data-card-category="race" disabled>
            Marcar como raca
          </button>
          <button class="button button--secondary" type="button" data-card-category="class" disabled>
            Marcar como classe
          </button>
          <button class="button button--secondary" type="button" data-card-category="divinity" disabled>
            Marcar como divindade
          </button>
        </div>

        <div class="action-grid">
          <button id="returnOriginButton" class="button button--secondary" type="button" disabled>
            Devolver origem
          </button>
        </div>
      </section>

      <form id="cardForm" class="form">
        <h2>Carta</h2>
        <label class="field">
          <span>Nome</span>
          <input id="cardName" name="cardName" type="text" placeholder="Carta sem nome" autocomplete="off" />
        </label>

        <label class="field">
          <span>Frente URL</span>
          <input id="frontUrl" name="frontUrl" type="url" placeholder="https://..." />
        </label>

        <label class="field">
          <span>Frente arquivo</span>
          <input id="frontFile" name="frontFile" type="file" accept="image/*" />
        </label>
        <button id="pickFrontAssetButton" class="button button--secondary" type="button">
          Escolher frente dos assets
        </button>

        <label class="field">
          <span>Verso URL</span>
          <input id="backUrl" name="backUrl" type="url" placeholder="https://..." />
        </label>

        <label class="field">
          <span>Verso arquivo</span>
          <input id="backFile" name="backFile" type="file" accept="image/*" />
        </label>
        <button id="pickBackAssetButton" class="button button--secondary" type="button">
          Escolher verso dos assets
        </button>

        <div class="row">
          <label class="field">
            <span>Largura no grid</span>
            <input id="gridWidth" name="gridWidth" type="number" min="0.25" max="20" step="0.25" value="2" required />
          </label>

          <label class="field">
            <span>Camada</span>
            <select id="layer" name="layer">
              <option value="DRAWING">Drawing</option>
              <option value="PROP" selected>Prop</option>
              <option value="MOUNT">Mount</option>
              <option value="CHARACTER">Character</option>
              <option value="ATTACHMENT">Attachment</option>
              <option value="NOTE">Note</option>
              <option value="TEXT">Text</option>
            </select>
          </label>
        </div>

        <section class="preview" aria-label="Prévia">
          <figure>
            <div class="preview__image">
              <img id="frontPreview" alt="Prévia da frente" hidden />
            </div>
            <figcaption>Frente</figcaption>
          </figure>
          <figure>
            <div class="preview__image">
              <img id="backPreview" alt="Prévia do verso" hidden />
            </div>
            <figcaption>Verso</figcaption>
          </figure>
        </section>

        <button id="importButton" class="button" type="submit" disabled>
          Importar carta
        </button>
      </form>

      <form id="deckForm" class="form">
        <h2>Pilha</h2>
        <label class="field">
          <span>Nome</span>
          <input id="deckName" name="deckName" type="text" placeholder="Pilha sem nome" autocomplete="off" />
        </label>

        <label class="field">
          <span>Verso URL</span>
          <input id="deckBackUrl" name="deckBackUrl" type="url" placeholder="https://..." />
        </label>

        <label class="field">
          <span>Verso arquivo</span>
          <input id="deckBackFile" name="deckBackFile" type="file" accept="image/*" />
        </label>
        <button id="pickDeckBackAssetButton" class="button button--secondary" type="button">
          Escolher verso dos assets
        </button>

        <label class="field">
          <span>Frentes URLs</span>
          <textarea id="deckFrontUrls" name="deckFrontUrls" rows="5" placeholder="Nome | https://..."></textarea>
        </label>

        <label class="field">
          <span>Frentes arquivos</span>
          <input id="deckFrontFiles" name="deckFrontFiles" type="file" accept="image/*" multiple />
        </label>
        <button id="pickDeckFrontAssetsButton" class="button button--secondary" type="button">
          Escolher frentes dos assets
        </button>
        <p id="deckAssetsStatus" class="field-note"></p>

        <div class="row">
          <label class="field">
            <span>Largura no grid</span>
            <input id="deckGridWidth" name="deckGridWidth" type="number" min="0.25" max="20" step="0.25" value="2" />
          </label>

          <label class="field">
            <span>Camada</span>
            <select id="deckLayer" name="deckLayer">
              <option value="DRAWING">Drawing</option>
              <option value="PROP" selected>Prop</option>
              <option value="MOUNT">Mount</option>
              <option value="CHARACTER">Character</option>
              <option value="ATTACHMENT">Attachment</option>
              <option value="NOTE">Note</option>
              <option value="TEXT">Text</option>
            </select>
          </label>
        </div>

        <section class="preview preview--single" aria-label="Previa da pilha">
          <figure>
            <div class="preview__image">
              <img id="deckBackPreview" alt="Previa do verso da pilha" hidden />
            </div>
            <figcaption>Verso</figcaption>
          </figure>
        </section>

        <button id="importDeckButton" class="button" type="submit" disabled>
          Importar pilha
        </button>
      </form>

      <section class="form">
        <h2>Publicar</h2>
        <label class="field">
          <span>URL pública</span>
          <input id="publicBaseUrl" name="publicBaseUrl" type="url" placeholder="https://usuario.github.io/repositorio" />
        </label>
        <p class="field-note">
          Use esta opção depois de copiar as imagens locais para o GitHub Pages.
        </p>
        <button id="migratePublicButton" class="button button--secondary" type="button" disabled>
          Migrar links locais da cena
        </button>
      </section>

      <section class="form">
        <h2>Tabuleiro padrÃ£o</h2>
        <p id="defaultBoardInfo" class="field-note">Nenhum tabuleiro padrao criado no localhost.</p>
        <div class="action-grid">
          <button id="createDefaultBoardButton" class="button button--secondary" type="button" disabled>
            Criar tabuleiro padrão
          </button>
          <button id="restoreDefaultBoardButton" class="button button--secondary" type="button" disabled>
            Restaurar tabuleiro padrão
          </button>
        </div>
      </section>

      <p id="message" class="message" role="status" aria-live="polite"></p>
    </main>

    <script type="module" src="./dist/app.js?v=36"></script>
  </body>
</html>

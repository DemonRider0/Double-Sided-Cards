<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cartas Duplas</title>
    <script type="module" src="./dist/sdk-boot.js?v=48"></script>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <img src="./icons/card.svg" alt="" class="topbar__icon" />
        <div>
          <h1>Cartas Duplas</h1>
          <p id="connectionStatus" class="status">Carregando painel...</p>
        </div>
      </header>

      <section class="form">
        <h2>Ações</h2>
        <div class="action-grid">
          <button id="panelFlipButton" class="button button--secondary" type="button" disabled>
            Virar selecionada
          </button>
          <button id="panelDrawButton" class="button button--secondary" type="button" disabled>
            Comprar da pilha
          </button>
          <button id="panelShuffleButton" class="button button--secondary" type="button" disabled>
            Embaralhar pilha
          </button>
          <button id="panelReturnButton" class="button button--secondary" type="button" disabled>
            Devolver para pilha
          </button>
          <button id="returnOriginButton" class="button button--secondary" type="button" disabled>
            Devolver origem
          </button>
          <button id="panelRepairButton" class="button button--secondary" type="button" disabled>
            Sincronizar cena
          </button>
        </div>
      </section>

      <section class="form">
        <h2>Jogadores e cores</h2>
        <ul id="colorAssignments" class="color-list" aria-live="polite">
          <li>Aguardando conexao...</li>
        </ul>
      </section>

      <section class="form">
        <h2>Biblioteca</h2>
        <label class="field">
          <span>Pilha padrao</span>
          <select id="presetDeckSelect" disabled></select>
        </label>
        <p id="presetDeckInfo" class="field-note"></p>
        <div class="row">
          <label class="field">
            <span>Largura no grid</span>
            <input id="presetDeckGridWidth" name="presetDeckGridWidth" type="number" min="0.25" max="20" step="0.25" value="2" disabled />
          </label>

          <label class="field">
            <span>Camada</span>
            <select id="presetDeckLayer" disabled>
              <option value="DRAWING">Drawing</option>
              <option value="PROP" selected>Prop</option>
              <option value="MOUNT">Mount</option>
              <option value="CHARACTER">Character</option>
              <option value="ATTACHMENT">Attachment</option>
              <option value="NOTE">Note</option>
              <option value="TEXT">Text</option>
            </select>
          </label>
        </div>
        <button id="importPresetDeckButton" class="button button--secondary" type="button" disabled>
          Criar pilha da biblioteca
        </button>
      </section>

      <section class="form">
        <h2>Publicar</h2>
        <label class="field">
          <span>URL pública</span>
          <input id="publicBaseUrl" name="publicBaseUrl" type="url" placeholder="https://usuario.github.io/repositorio" />
        </label>
        <p class="field-note">
          Use esta opção depois de copiar as imagens locais para o GitHub Pages.
        </p>
        <button id="migratePublicButton" class="button button--secondary" type="button" disabled>
          Migrar links locais da cena
        </button>
      </section>

      <section class="form">
        <h2>Mapas salvos</h2>
        <p id="defaultBoardInfo" class="field-note">Carregando mapas salvos...</p>
        <div class="action-grid">
          <button class="button button--secondary" type="button" data-create-scene-preset="tutorial" disabled hidden>
            Salvar Tutorial
          </button>
          <button class="button button--secondary" type="button" data-create-scene-preset="missao-0-5" disabled hidden>
            Salvar Miss&atilde;o 0.5
          </button>
          <button class="button button--secondary" type="button" data-restore-scene-preset="tutorial" disabled>
            Restaurar o Tutorial
          </button>
          <button class="button button--secondary" type="button" data-restore-scene-preset="missao-0-5" disabled>
            Restaurar a Miss&atilde;o 0.5 (n&atilde;o oficial)
          </button>
        </div>
      </section>

      <p id="message" class="message" role="status" aria-live="polite"></p>
    </main>

    <script type="module" src="./dist/app.js?v=48"></script>
  </body>
</html>
